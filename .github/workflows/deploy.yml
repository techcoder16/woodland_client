name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Static Site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::962410672535:role/woodland-deploy-role
          aws-region: eu-central-1
          role-duration-seconds: 900

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_PUBLIC_OFFICE_ADDRESS: ${{ secrets.VITE_PUBLIC_OFFICE_ADDRESS }}
          VITE_PUBLIC_OFFICE_CITY: ${{ secrets.VITE_PUBLIC_OFFICE_CITY }}
          VITE_PUBLIC_OFFICE_POSTCODE: ${{ secrets.VITE_PUBLIC_OFFICE_POSTCODE }}



       
      - name: Delete old S3 objects
        run: aws s3 rm s3://woodland-frontend/ --recursive

      - name: Upload new files to S3 + cache headers
        run: |
          aws s3 cp dist/ s3://woodland-frontend/ \
            --recursive \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"


          aws s3 cp dist/ s3://woodland-frontend/ \
            --recursive \
            --cache-control "no-cache, no-store, must-revalidate, max-age=0" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EPK8FOZBBQIZT \
            --paths "/*"